"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """$directory$git_branch$git_status$character"""
right_format = """$python$nodejs$golang$docker_context"""

[character]
success_symbol = "[❱](green)"
error_symbol = "[❱](red)"
vimcmd_symbol = "[❰](blue)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "cyan"

[git_branch]
symbol = " "
style = "white"

# Per-state counts instead of a single * marker — see exactly what's dirty.
[git_status]
format     = "([$ahead_behind$staged$modified$untracked$deleted$conflicted]($style) )"
style      = "white"
ahead      = "⇡${count} "
behind     = "⇣${count} "
diverged   = "⇡${ahead_count}⇣${behind_count} "
staged     = "[+${count} ](green)"
modified   = "[●${count} ](yellow)"
untracked  = "[?${count} ](white)"
deleted    = "[✘${count} ](red)"
conflicted = "[⚡${count} ](red)"

[python]
symbol = "🐍 "
style = "yellow"
format = "[$symbol$version]($style) "

[nodejs]
symbol = "⬢ "
style = "green"
format = "[$symbol$version]($style) "

[docker_context]
symbol = "🐳 "
style = "cyan"
format = "[$symbol]($style) "
